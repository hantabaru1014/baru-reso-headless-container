  string saved_world_url = 1;
}

message SaveAsSessionWorldRequest {
  enum SaveAsType {
    SAVE_AS_TYPE_UNSPECIFIED = 0;
    SAVE_AS_TYPE_SAVE_AS = 1;
    SAVE_AS_TYPE_COPY = 2;
  }
  string session_id = 1;
  SaveAsType type = 2;
}

message SaveAsSessionWorldResponse {
  string saved_record_url = 1;
}

message DownloadSessionWorldRequest {
  string session_id = 1;
  WorldBinaryFormat format = 2;
  // resonitepackage 用。他フォーマットでは無視
  optional bool include_variants = 3;
  // BRSON 用 quality (0-11)。未指定時はデフォルト値を使用
  optional int32 brotli_quality = 4;
}

message DownloadSessionWorldResponse {
  bytes chunk = 1;
}

message InviteUserRequest {
  string session_id = 1;
  oneof user {
    string user_id = 2;
    string user_name = 3;
  }
}

message InviteUserResponse {}

message AllowUserToJoinRequest {
  string session_id = 1;
  string user_id = 2;
}

message AllowUserToJoinResponse {}

message UpdateUserRoleRequest {
  string session_id = 1;
  oneof user {
    string user_id = 2;
    string user_name = 3;
  }
  string role = 4;
}

message UpdateUserRoleResponse {
  // 変更後のロール(無効なロールを指定した場合そのままの可能性)
  string role = 1;
}

message UpdateSessionParametersRequest {
  string session_id = 1;
  optional string name = 2;
  optional string description = 3;
  optional int32 max_users = 4;
  optional AccessLevel access_level = 5;
  optional float away_kick_minutes = 6;
  optional int32 idle_restart_interval_seconds = 7;
  optional bool save_on_exit = 8;
  optional int32 auto_save_interval_seconds = 9;
  optional bool auto_sleep = 10;
  optional bool hide_from_public_listing = 11;
  bool update_tags = 12;
  repeated string tags = 13;
  optional bool use_custom_join_verifier = 14;
  optional bool mobile_friendly = 15;
  optional RecordId override_corresponding_world_id = 16;
  optional string role_cloud_variable = 17;
  optional string allow_user_cloud_variable = 18;
  optional string deny_user_cloud_variable = 19;
  optional string required_user_join_cloud_variable = 20;
  optional string required_user_join_cloud_variable_deny_message = 21;
}

message UpdateSessionParametersResponse {}

message ListUsersInSessionRequest {
  string session_id = 1;
}

message ListUsersInSessionResponse {
  repeated UserInSession users = 1;
}

message WatchHostEventsRequest {
  // Empty string (default) means deliver only events from this point
  // forward. Otherwise the server replays buffered events with id strictly
  // greater than after_event_id (lexicographic / ULID order) before
  // resuming live delivery. If after_event_id is older than the oldest
  // buffered event, the server fails with OUT_OF_RANGE so the client
  // knows it must do a full state resync.
  string after_event_id = 1;
}

// HostEvent represents a single event emitted by this headless host
// (= container). Ids are ULIDs (Crockford-base32, 26 chars); they are
// monotonically increasing and survive container restarts, so controllers
// can persist the last-seen id and resume safely after either a
// controller or container restart.
//
// The monotonic guarantee is only as strong as the system clock — a
// backwards NTP step (within a single run, or after a restart that
// rewinds wall-clock) can make a freshly emitted id sort *below* a
// persisted resume token, which would silently filter out the new
// events. Operators should keep ntpd / chrony in slew mode rather than
// allowing step adjustments.
message HostEvent {
  string id = 1;
  google.protobuf.Timestamp occurred_at = 2;
  oneof payload {
    SessionStarted session_started = 10;
    SessionEnded session_ended = 11;
    UserJoinedSession user_joined_session = 12;
    UserLeftSession user_left_session = 13;
    WorldSaved world_saved = 14;
    SessionParametersChanged session_parameters_changed = 15;
  }
}

message SessionStarted {
  string session_id = 1;
  string session_name = 2;
  // Instance.Time.LocalSessionBeginTime に基づく実際の session 開始時刻
  google.protobuf.Timestamp started_at = 3;
}

message SessionEnded {
  string session_id = 1;
}

message UserJoinedSession {
  string session_id = 1;
  string user_id = 2;
  string user_name = 3;
}

message UserLeftSession {
  string session_id = 1;
  string user_id = 2;
  string user_name = 3;
}

message WorldSaved {
  string session_id = 1;
  // 保存後のレコードURL。Save as 等で世界の URL が変わった場合があるので毎回送る
  string world_url = 2;
}

// session の name/description/access_level/max_users/tags/hide_from_public_listing/
// away_kick_minutes/idle_restart_interval_seconds/save_on_exit/auto_save_interval_seconds/
// auto_sleep などが変化したときに emit する。差分通知ではなく現在のスナップショットを送る
message SessionParametersChanged {
  string session_id = 1;
  Session session = 2;
}

// models

enum WorldBinaryFormat {
  WORLD_BINARY_FORMAT_UNSPECIFIED = 0;
  WORLD_BINARY_FORMAT_7ZBSON = 1;
  WORLD_BINARY_FORMAT_BRSON = 2;
  WORLD_BINARY_FORMAT_RESONITEPACKAGE = 3;
}

enum AccessLevel {
  ACCESS_LEVEL_UNSPECIFIED = 0;
  ACCESS_LEVEL_PRIVATE = 1;
  ACCESS_LEVEL_LAN = 2;
  ACCESS_LEVEL_CONTACTS = 3;
  ACCESS_LEVEL_CONTACTS_PLUS = 4;
  ACCESS_LEVEL_REGISTERED_USERS = 5;
  ACCESS_LEVEL_ANYONE = 6;
}

message UserInSession {
  string id = 1;
  string name = 2;
  string role = 3;
  bool is_present = 4;
}

message UserInfo {
  string id = 1;
  string name = 2;
  string icon_url = 3;
}

message Session {
  string id = 1;
  string name = 2;
  string description = 3;
  AccessLevel access_level = 4;
  int32 users_count = 7;
  int32 max_users = 8;
  optional string thumbnail_url = 5;
  WorldStartupParameters startup_parameters = 6;
  string session_url = 9;
  int32 time_running_ms = 10 [deprecated = true];
  float away_kick_minutes = 11;
  int32 idle_restart_interval_seconds = 12;
  bool save_on_exit = 13;
  int32 auto_save_interval_seconds = 14;
  bool auto_sleep = 15;
  bool hide_from_public_listing = 16;
  repeated string tags = 17;
  optional google.protobuf.Timestamp last_saved_at = 18;
  bool can_save = 19;
  string world_url = 20;
  google.protobuf.Timestamp started_at = 21;
  repeated string connect_uris = 22;
  bool can_save_as = 23;
  // 現在この session に張られている ResoniteLink ブリッジ stream の本数
  int32 resonite_link_clients_count = 24;
}

message DefaultUserRole {
  string role = 1;
  string user_name = 2;
}

message WorldStartupParameters {
  optional string name = 1;
  optional string custom_session_id = 2;
  optional string description = 3;
  repeated string tags = 10;
  optional int32 max_users = 4;
  AccessLevel access_level = 5;
  oneof load_world {
    string load_world_url = 6;
    string load_world_preset_name = 7;
  }
  repeated string auto_invite_usernames = 8;
  bool hide_from_public_listing = 9;
  repeated DefaultUserRole default_user_roles = 11;
  float away_kick_minutes = 12;
  int32 idle_restart_interval_seconds = 13;
  bool save_on_exit = 14;
  int32 auto_save_interval_seconds = 15;
  bool auto_sleep = 16;
  repeated string invite_request_handler_usernames = 17;
  uint32 force_port = 18;
  repeated string parent_session_ids = 19;
  bool auto_recover = 20;
  int32 forced_restart_interval_seconds = 21;
  bool use_custom_join_verifier = 22;
  bool mobile_friendly = 23;
  optional RecordId override_corresponding_world_id = 24;
  bool keep_original_roles = 25;
  optional string role_cloud_variable = 26;
  optional string allow_user_cloud_variable = 27;
  optional string deny_user_cloud_variable = 28;
  optional string required_user_join_cloud_variable = 29;
  optional string required_user_join_cloud_variable_deny_message = 30;
  optional string auto_invite_message = 31;
  repeated string join_allowed_user_ids = 32;
}

enum ContactChatMessageType {
  CONTACT_CHAT_MESSAGE_TYPE_UNSPECIFIED = 0;
  CONTACT_CHAT_MESSAGE_TYPE_TEXT = 1;
  CONTACT_CHAT_MESSAGE_TYPE_OBJECT = 2;
  CONTACT_CHAT_MESSAGE_TYPE_SOUND = 3;
  CONTACT_CHAT_MESSAGE_TYPE_SESSION_INVITE = 4;
}

message ContactChatMessage {
  string id = 1;
  ContactChatMessageType type = 2;
  string content = 3;
  google.protobuf.Timestamp send_time = 4;
  optional google.protobuf.Timestamp read_time = 5;
  string sender_id = 6;
}

message AllowedAccessEntry {
  enum AccessType {
    ACCESS_TYPE_UNSPECIFIED = 0;
    ACCESS_TYPE_HTTP = 1;
    ACCESS_TYPE_WEBSOCKET = 2;
    ACCESS_TYPE_OSC_RECEIVING = 3;
    ACCESS_TYPE_OSC_SENDING = 4;
  }

  string host = 1;
  repeated int32 ports = 2;
  repeated AccessType access_types = 3;
}

message StartupConfig {
  optional string universe_id = 1;
  optional float tick_rate = 2;
  optional int32 max_concurrent_asset_transfers = 3;
  optional string username_override = 4;
  repeated WorldStartupParameters start_worlds = 5;
  repeated AllowedAccessEntry allowed_url_hosts = 6;
  repeated string auto_spawn_items = 7;
}

message RecordId {
  string id = 1;
  string owner_id = 2;
}

// World 内操作系 RPC のメッセージ定義

// 公式 headless の dynamicImpulse / dynamicImpulseString / dynamicImpulseInt /
// dynamicImpulseFloat 相当。value oneof で挙動を切り替える (未指定なら
// 引数なしの impulse を送る)。
message SendDynamicImpulseRequest {
  string session_id = 1;
  string tag = 2;
  oneof value {
    string string_value = 3;
    int32 int_value = 4;
    float float_value = 5;
  }
}

message SendDynamicImpulseResponse {
  // TriggerDynamicImpulse(WithArgument) の返り値 (発火したレシーバ数)
  int32 triggered_receivers = 1;
}

// 公式 headless の gc 相当。System.GC.Collect() をトリガする。
message RunGarbageCollectionRequest {}

message RunGarbageCollectionResponse {}

// 指定セッションの World 状態を強制的に再同期する。
// 現在の実装は SyncController.EncodeFullBatch() で組んだ FullBatch を
// 非ホストユーザ全員に対して再送する best-effort な挙動。
message ForceSyncSessionRequest {
  string session_id = 1;
}

message ForceSyncSessionResponse {}

// 公式 headless の debugWorldState 相当。指定セッションの World / Session
// の内部状態スナップショットを返す。エンジン診断用途。
message GetWorldDebugStateRequest {
  string session_id = 1;
}

message GetWorldDebugStateResponse {
  string world_name = 1;
  int32 local_world_handle = 2;
  // FrooxEngine.World.RefreshStage の文字列表現
  string stage = 3;
  uint64 sync_tick = 4;
  uint64 state_version = 5;
  // Session が未初期化なら以下 session_* は 0 / 空文字列
  // FrooxEngine.SyncLoopStage の文字列表現
  string session_sync_loop_stage = 6;
  bool session_stop_processing_flag = 7;
  int32 session_messages_to_process_count = 8;
  int32 session_total_processed_messages = 9;
  int32 session_messages_to_transmit_count = 10;
  // World.SlotCount (全 slot 数)
  int32 slot_count = 11;
  int32 user_count = 12;
  int32 active_user_count = 13;
  optional string currently_processing_sync_message = 14;
  optional string currently_decoding_stream = 15;
}

// ResoniteLink を gRPC bidi stream で中継する。
// クライアントは stream 開始直後に必ず ResoniteLinkInit を送り、以降は
// ResoniteLink の JSON テキスト/バイナリペイロードをそのまま流す。
message ResoniteLinkStreamRequest {
  oneof payload {
    ResoniteLinkInit init = 1;
    string text_frame = 2;
    bytes binary_frame = 3;
  }
}

message ResoniteLinkInit {
  string session_id = 1;
}

message ResoniteLinkStreamResponse {
  oneof payload {
    ResoniteLinkReady ready = 1;
    string text_frame = 2;
    bytes binary_frame = 3;
  }
}

message ResoniteLinkReady {}
