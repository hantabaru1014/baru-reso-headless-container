name: Image Build Test

# Resonite バージョンアップ時などに headless image がビルドできることを確認するためのワークフロー。
# 正式な配布は builder image (build-builder-image.yml) 経由で行う。
# image はビルドして integration test に使うだけで、どこにも push しない。

on:
  workflow_dispatch:
    inputs:
      resonite_branch:
        type: choice
        required: false
        description: "Resonite branch(beta)"
        default: "headless"
        options:
          - "headless"
          - "prerelease"
      git_branch:
        type: string
        required: false
        description: "Source git branch"
        default: "main"

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  download:
    runs-on: ubuntu-latest
    outputs:
      resonite_version: ${{ steps.download.outputs.resonite_version }}
      cache_key: ${{ steps.download.outputs.cache_key }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.git_branch }}

      - name: Download Resonite
        id: download
        uses: ./.github/actions/download-resonite
        with:
          resonite_branch: ${{ inputs.resonite_branch }}
          steam_username: ${{ secrets.STEAM_USERNAME }}
          steam_password: ${{ secrets.STEAM_PASSWORD }}
          headless_password: ${{ secrets.HEADLESS_PASSWORD }}

  test:
    needs: download
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.git_branch }}

      - name: Restore Resonite cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ./Resonite/Headless
            ./native-libs
          key: ${{ needs.download.outputs.cache_key }}
          fail-on-cache-miss: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build Docker image for testing (${{ matrix.arch }})
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:test-${{ matrix.arch }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Run integration tests
        uses: ./.github/actions/run-tests
        with:
          image_tag: ${{ env.IMAGE_NAME }}:test-${{ matrix.arch }}
