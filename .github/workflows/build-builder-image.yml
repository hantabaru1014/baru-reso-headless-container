name: Build and Push Builder Image

# builder image (controller のローカルビルド委譲先) を GHCR に発行する。
# このイメージは Resonite バイナリを含まないため public 配布できる。
# GitHub Release の publish で自動実行され、release tag がそのままアプリバージョンになる。

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      git_ref:
        type: string
        required: false
        description: "Source git ref"
        default: "main"
      app_version:
        type: string
        required: false
        description: "App version to bake in (default: latest release tag)"
        default: ""
      push_latest:
        type: boolean
        required: false
        description: "Push :latest tag"
        default: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ${{ github.repository }}/builder

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.git_ref }}

      - name: Resolve app version
        id: app-version
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.app_version }}
        run: |
          if [ "${EVENT_NAME}" = "release" ]; then
            VERSION="${RELEASE_TAG}"
          elif [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          else
            VERSION="$(gh release view --repo "${GITHUB_REPOSITORY}" --json tagName --jq .tagName)"
          fi
          echo "app_version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: tags
        env:
          APP_VERSION: ${{ steps.app-version.outputs.app_version }}
          PUSH_LATEST: ${{ github.event_name == 'release' || inputs.push_latest }}
        run: |
          TAGS="ghcr.io/${IMAGE_NAME}:${APP_VERSION}"
          if [ "${PUSH_LATEST}" = "true" ]; then
            TAGS="${TAGS},ghcr.io/${IMAGE_NAME}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push builder image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: builder/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ steps.app-version.outputs.app_version }}
          tags: ${{ steps.tags.outputs.tags }}
